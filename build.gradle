apply plugin: "java"

version = '1.0'
group = 'mindustry.tcpmod'

sourceSets.main.java.srcDirs = ["src"]

repositories {
    mavenCentral()

    ivy {
        url = 'https://github.com/'
        patternLayout { artifact '/[organisation]/[module]/releases/download/[revision]/dependencies.jar' }
        metadataSources { artifact() }
    }

    ivy {
        url = 'https://github.com/'
        patternLayout { artifact '/[organisation]/[module]/releases/[revision]/download/dependencies.jar' }
        metadataSources { artifact() }
    }
}

java {
    targetCompatibility = JavaVersion.VERSION_17
    sourceCompatibility = JavaVersion.VERSION_17
}

ext {
    mindustryVersion = "v159.6"
}

dependencies {
    compileOnly "Anuken:Mindustry:$mindustryVersion"
}

jar {
    archiveFileName = "tcp-mod.jar"

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    from(projectDir) {
        include "mod.hjson"
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
